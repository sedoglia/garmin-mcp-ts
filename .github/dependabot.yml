version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Security fixes arrive as a single PR so the auto-merge gate in
      # .github/workflows/dependabot-auto-merge.yml runs once instead of
      # once per advisory. The group name is matched there literally.
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      # Routine bumps are grouped only to cut noise; they are never
      # auto-merged and still need a human.
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
