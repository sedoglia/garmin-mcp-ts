name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      # Optional dependencies must stay in: TypeScript ships its native
      # compiler binary as one (@typescript/typescript-<platform>), so
      # --omit=optional breaks tsc outright. keytar is optional too and is
      # allowed to fail here; npm treats that as non-fatal by design.
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Reported, not enforced: a fresh advisory should not turn unrelated
      # pull requests red.
      - name: Audit
        run: npm audit --audit-level=high
        continue-on-error: true
